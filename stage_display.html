<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点歌盲盒 · 雨窗</title>
<link rel="stylesheet" href="shared.css">
<style>
  html,body{height:100%;overflow:hidden}
  body{height:100vh;display:flex;flex-direction:column;position:relative}

  /* ── 七层雨窗 ── */
  .rw{position:fixed;inset:0;z-index:0;pointer-events:none}
  .rw-night{background:var(--night)}
  .rw-clouds .c{position:absolute;border-radius:50%;filter:blur(55px);opacity:.45;
    animation:cloudDrift 14s ease-in-out infinite}
  .rw-clouds .c1{width:520px;height:200px;left:-140px;top:5%;
    background:radial-gradient(ellipse,rgba(29,39,49,.95),transparent 68%)}
  .rw-clouds .c2{width:480px;height:180px;right:-120px;top:38%;
    background:radial-gradient(ellipse,rgba(18,28,38,.9),transparent 68%);animation-delay:-4.5s}
  .rw-clouds .c3{width:400px;height:160px;left:22%;bottom:4%;
    background:radial-gradient(ellipse,rgba(22,32,42,.88),transparent 68%);animation-delay:-8s}
  #rainCanvas{position:absolute;inset:0;width:100%;height:100%;opacity:.72}
  .rw-glass{
    position:absolute;inset:0;
    backdrop-filter:blur(10px) saturate(.7);
    -webkit-backdrop-filter:blur(10px) saturate(.7);
    background:rgba(29,39,49,.18);
  }
  .rw-fog{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 30% 40%,rgba(223,230,236,.09),transparent 55%),
      radial-gradient(ellipse 70% 50% at 72% 62%,rgba(223,230,236,.07),transparent 50%),
      radial-gradient(ellipse 90% 70% at 50% 50%,rgba(223,230,236,.05),transparent 60%);
    animation:fogDrift 14s ease-in-out infinite;
    transition:opacity 1.2s ease;
  }
  .rw-fog.thin{opacity:.35}
  .rw-streaks{
    position:absolute;inset:0;opacity:.18;
    background:repeating-linear-gradient(
      108deg,
      transparent 0px,transparent 38px,
      rgba(223,230,236,.12) 38px,rgba(223,230,236,.04) 40px,
      transparent 40px,transparent 90px
    );
  }
  .rw-drops{position:absolute;inset:0;overflow:hidden}
  .drop{
    position:absolute;width:1px;border-radius:1px;
    background:linear-gradient(180deg,transparent,rgba(223,230,236,.25),transparent);
    transform-origin:center top;
    animation:streakSlide linear infinite;
  }
  @keyframes streakSlide{
    0%{transform:translateY(0) scaleY(.3);opacity:0}
    6%{opacity:.5}
    94%{opacity:.35}
    100%{transform:translateY(110vh) scaleY(1);opacity:0}
  }
  @keyframes fogDrift{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(12px,-8px) scale(1.02)}
  }

  /* ⑥ 昏黄灯光 */
  .rw-lamp{
    position:fixed;z-index:1;pointer-events:none;
    top:50%;left:50%;width:min(520px,90vw);height:min(520px,70vh);
    transform:translate(-50%,-52%);
    background:radial-gradient(ellipse,rgba(232,201,138,.14) 0%,rgba(232,201,138,.04) 35%,transparent 68%);
    animation:lampBreathe 6s ease-in-out infinite;
  }
  @keyframes lampBreathe{
    0%,100%{opacity:.55;transform:translate(-50%,-52%) scale(.96)}
    50%{opacity:1;transform:translate(-50%,-52%) scale(1.04)}
  }

  /* 擦窗 */
  .rw-wipe{
    position:fixed;inset:0;z-index:4;pointer-events:none;opacity:0;
    background:linear-gradient(90deg,
      transparent 0%,transparent 42%,
      rgba(232,201,138,.0) 46%,
      rgba(232,201,138,.22) 50%,
      rgba(232,201,138,.0) 54%,
      transparent 58%,transparent 100%);
    background-size:300% 100%;
    background-position:120% 0;
  }
  .rw-wipe.on{
    opacity:1;
    animation:wipeAcross 1.4s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes wipeAcross{
    0%{background-position:120% 0;opacity:0}
    15%{opacity:1}
    100%{background-position:-20% 0;opacity:0}
  }

  .rw-vignette{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(130% 100% at 50% 42%,transparent 44%,rgba(8,12,16,.78) 100%);
  }

  /* ── 内容层 ── */
  .wrap{
    flex:1;display:flex;flex-direction:column;width:100%;max-width:820px;
    margin:0 auto;padding:28px 28px 36px;z-index:3;
  }
  header{align-items:flex-start}
  .brand h1{
    font-size:clamp(22px,4vw,28px);letter-spacing:.42em;text-indent:.42em;
    color:var(--ink);font-weight:200;
  }
  .brand .sub{letter-spacing:.44em;text-indent:.44em}
  .stats{gap:22px}
  .stat{padding:0;border:none;background:none;backdrop-filter:none}

  .stage{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;position:relative;
  }
  .frame{
    position:relative;width:100%;max-width:600px;padding:56px 28px;
    display:flex;flex-direction:column;align-items:center;
  }

  .eyebrow{
    font-size:11px;letter-spacing:.44em;color:var(--ink-dim);
    margin-bottom:32px;font-weight:200;
    transition:color 1s ease;
  }
  .eyebrow.live{color:var(--lamp)}
  .eyebrow.breathe{animation:textBreathe 5s ease-in-out infinite}

  .result{
    position:relative;font-weight:200;line-height:1.5;
    min-height:1.4em;transition:filter .6s ease;
  }
  .result.idle{
    font-size:clamp(16px,3vw,20px);letter-spacing:.44em;
    color:var(--ink-dim);text-shadow:none;
  }
  .result.idle.breathe{animation:textBreathe 5s ease-in-out infinite}
  .result.rolling{
    font-size:14px;letter-spacing:.5em;color:var(--ink-dim);
    filter:blur(3px);opacity:.65;
  }
  .result.win{
    font-size:clamp(32px,6.5vw,64px);letter-spacing:.5em;
    color:var(--ink);
    text-shadow:0 0 28px var(--lamp-soft),0 0 60px rgba(232,201,138,.08);
    filter:blur(6px);opacity:0;
    animation:condense 1.8s cubic-bezier(.22,1,.36,1) forwards;
  }
  .result.win .meta{
    display:block;font-size:clamp(11px,2vw,14px);letter-spacing:.4em;
    color:var(--lamp);margin-top:22px;font-weight:200;opacity:.85;
    text-shadow:0 0 16px var(--lamp-glow);
  }
  @keyframes condense{
    0%{filter:blur(8px);opacity:0;letter-spacing:.5em;transform:scale(.98)}
    40%{filter:blur(4px);opacity:.5}
    100%{filter:blur(0);opacity:1;letter-spacing:.12em;transform:scale(1)}
  }
  @keyframes textBreathe{
    0%,100%{opacity:.38}
    50%{opacity:.72}
  }

  .draw-btn{
    margin-top:48px;font-family:inherit;font-weight:200;cursor:pointer;
    color:var(--ink);border:1px solid var(--line);padding:16px 58px;
    font-size:13px;letter-spacing:.44em;text-indent:.44em;
    border-radius:2px;background:rgba(29,39,49,.35);
    backdrop-filter:blur(6px);transition:border-color .4s,color .4s,box-shadow .4s;
  }
  .draw-btn:hover:not(:disabled){
    border-color:rgba(232,201,138,.35);color:var(--lamp);
    box-shadow:0 0 32px var(--lamp-glow);
  }
  .draw-btn:disabled{opacity:.22;cursor:not-allowed}

  .keep{
    margin-top:28px;display:flex;gap:28px;font-size:12px;letter-spacing:.36em;
    opacity:0;transform:translateY(8px);transition:all .6s ease;pointer-events:none;
  }
  .keep.show{opacity:1;transform:none;pointer-events:auto}
  .keep button{
    background:none;border:none;color:var(--ink-dim);cursor:pointer;
    font-family:inherit;font-weight:200;letter-spacing:inherit;
    padding:6px 2px;transition:color .3s;
  }
  .keep button:hover{color:var(--lamp)}
  #putBack:hover{color:var(--glass-cold)}

  .site-copy{padding-bottom:16px}
    .rw-clouds .c,.rw-fog,.rw-lamp,.eyebrow.breathe,.result.idle.breathe,.result.win,.rw-wipe.on{animation:none}
    .result.win{filter:none;opacity:1;letter-spacing:.12em}
  }
</style>
</head>
<body>

<!-- ①②③④⑤ 雨窗层 -->
<div class="rw rw-night"></div>
<div class="rw rw-clouds">
  <div class="c c1"></div><div class="c c2"></div><div class="c c3"></div>
</div>
<canvas class="rw" id="rainCanvas"></canvas>
<div class="rw rw-glass"></div>
<div class="rw rw-fog" id="fog"></div>
<div class="rw rw-streaks"></div>
<div class="rw rw-drops" id="drops"></div>
<div class="rw-wipe" id="wipe"></div>
<div class="rw-vignette"></div>

<!-- ⑥ 灯光 -->
<div class="rw-lamp"></div>

<!-- ⑦ 内容 -->
<div class="wrap">
  <header>
    <div class="brand">
      <div class="deco">rain window</div>
      <h1>点歌盲盒</h1>
      <div class="sub">深夜雨窗</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="poolCount">0</div><div class="lbl">待抽</div></div>
      <div class="stat"><div class="num" id="sungCount">0</div><div class="lbl">已唱</div></div>
    </div>
  </header>

  <div class="stage">
    <div class="frame">
      <div class="eyebrow breathe" id="eyebrow">窗外有雨</div>
      <div class="result idle breathe" id="result">窗外有雨</div>
    </div>
    <button class="draw-btn" id="drawBtn" disabled>抽 取</button>
    <div class="keep" id="keepRow">
      <button id="confirmSung">这首唱了</button>
      <button id="putBack">放回池子</button>
    </div>
  </div>
  <footer class="site-copy">© 2026 <a href="https://github.com/zlxjkason720821" target="_blank" rel="noopener">zlxjkason720821</a> · 点歌盲盒</footer>
</div>

<script src="shared.js"></script>
<script>
const { STORE_KEY, SOUND_KEY, esc, fmtSub, loadPool, savePool, loadSound, playSound, resumeAudio } = SongRoulette;
let pool = [], sung = [], lastDrawn = null, rolling = false;
let soundOn = true, _soundType = "celestial";
const $ = s => document.querySelector(s);

/* 雨丝 canvas */
(function rain() {
  const c = $("#rainCanvas"), ctx = c.getContext("2d");
  let W, H, drops = [];
  const ANGLE = .14;
  function mkDrop(fullH) {
    const layer = Math.random();
    const fast = layer > .55;
    return {
      x: Math.random() * W,
      y: Math.random() * (fullH ? H : -80),
      len: fast ? 22 + Math.random() * 38 : 14 + Math.random() * 22,
      spd: fast ? 18 + Math.random() * 26 : 10 + Math.random() * 14,
      op: fast ? .22 + Math.random() * .32 : .1 + Math.random() * .18,
      w: fast ? .45 + Math.random() * .55 : .3 + Math.random() * .35,
      wind: ANGLE + (Math.random() - .5) * .04
    };
  }
  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
    const n = Math.floor(W * .55);
    drops = Array.from({ length: n }, () => mkDrop(true));
  }
  function frame() {
    ctx.clearRect(0, 0, W, H);
    drops.forEach(d => {
      ctx.globalAlpha = d.op;
      ctx.strokeStyle = "rgba(122,150,171,.85)";
      ctx.lineWidth = d.w;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.len * d.wind, d.y + d.len);
      ctx.stroke();
      d.y += d.spd;
      d.x -= d.spd * d.wind;
      if (d.y - d.len > H) Object.assign(d, mkDrop(false));
    });
    requestAnimationFrame(frame);
  }
  resize();
  window.addEventListener("resize", resize);
  frame();
})();

/* 玻璃水痕（慢，与空中雨丝区分） */
(function streaks() {
  const box = $("#drops");
  for (let i = 0; i < 22; i++) {
    const d = document.createElement("div");
    d.className = "drop";
    d.style.left = (3 + Math.random() * 94) + "%";
    d.style.top = (-Math.random() * 20) + "%";
    d.style.height = (18 + Math.random() * 36) + "px";
    d.style.animationDuration = (2.8 + Math.random() * 3.5) + "s";
    d.style.animationDelay = (-Math.random() * 8) + "s";
    box.appendChild(d);
  }
})();

function loadData() {
  const p = loadPool(); pool = p.pool; sung = p.sung;
  const s = loadSound(); soundOn = s.soundOn; _soundType = s.type;
}
function saveData() { savePool(pool, sung); }
function refresh() {
  $("#poolCount").textContent = pool.length;
  $("#sungCount").textContent = sung.length;
  if (!rolling) $("#drawBtn").disabled = pool.length === 0;
}
function chime() { if (soundOn) playSound(_soundType); }

function setIdle(noSongs) {
  const res = $("#result"), brow = $("#eyebrow");
  res.className = "result idle breathe";
  brow.className = "eyebrow breathe";
  if (noSongs) {
    res.textContent = "窗外有雨";
    brow.textContent = "在控制台填入歌单";
  } else {
    res.textContent = "窗外有雨";
    brow.textContent = "窗外有雨";
  }
  $("#fog").classList.remove("thin");
}

function draw() {
  if (pool.length === 0 || rolling) return;
  resumeAudio();
  rolling = true;
  $("#drawBtn").disabled = true;
  $("#keepRow").classList.remove("show");

  const brow = $("#eyebrow"), res = $("#result"), fog = $("#fog"), wipe = $("#wipe");
  brow.className = "eyebrow";
  brow.textContent = "拭去窗上的雾";
  fog.classList.add("thin");
  wipe.classList.remove("on");
  void wipe.offsetWidth;
  wipe.classList.add("on");

  res.className = "result rolling";
  const dur = 1800, t0 = performance.now();
  function frame(now) {
    const t = now - t0;
    if (t < dur) {
      res.textContent = pool[Math.floor(Math.random() * pool.length)].name;
      setTimeout(() => requestAnimationFrame(frame), 48 + Math.max(0, (t / dur) * 140));
    } else finish();
  }
  requestAnimationFrame(frame);
}

function finish() {
  lastDrawn = pool[Math.floor(Math.random() * pool.length)];
  const res = $("#result"), brow = $("#eyebrow");
  const sub = fmtSub(lastDrawn);
  res.className = "result win";
  res.innerHTML = esc(lastDrawn.name) + (sub ? `<span class="meta">${esc(sub)}</span>` : "");
  brow.className = "eyebrow live";
  brow.textContent = "为你唱这一首";
  $("#keepRow").classList.add("show");
  chime();
  rolling = false;
  $("#drawBtn").disabled = pool.length === 0;
}

$("#drawBtn").onclick = draw;
$("#confirmSung").onclick = () => {
  if (!lastDrawn) return;
  pool = pool.filter(x => x.id !== lastDrawn.id);
  sung.push(lastDrawn);
  lastDrawn = null;
  $("#keepRow").classList.remove("show");
  const brow = $("#eyebrow");
  brow.className = "eyebrow breathe";
  brow.textContent = pool.length ? "雨停了" : "雨停了";
  $("#result").className = "result idle breathe";
  $("#result").textContent = pool.length ? "窗外有雨" : "雨停了";
  saveData(); refresh();
};
$("#putBack").onclick = () => {
  lastDrawn = null;
  $("#keepRow").classList.remove("show");
  setIdle(false);
  refresh();
};

document.addEventListener("keydown", e => {
  if (e.code === "Space" && e.target.tagName !== "INPUT" && e.target.tagName !== "TEXTAREA") {
    e.preventDefault(); draw();
  }
});

window.addEventListener("storage", e => {
  if (e.key === STORE_KEY) {
    loadData(); refresh();
    if (!rolling && !lastDrawn) setIdle(pool.length === 0);
  }
  if (e.key === SOUND_KEY) {
    try {
      const s = JSON.parse(e.newValue);
      if (s) { soundOn = s.on !== false; _soundType = s.type || "celestial"; }
    } catch (_) {}
  }
});
setInterval(() => {
  try {
    const d = JSON.parse(localStorage.getItem(STORE_KEY));
    if (d && !rolling) {
      const np = (d.pool || []).length, ns = (d.sung || []).length;
      if (np !== pool.length || ns !== sung.length) {
        pool = d.pool || []; sung = d.sung || [];
        refresh();
        if (!lastDrawn) setIdle(pool.length === 0);
      }
    }
  } catch (_) {}
}, 1200);

loadData(); refresh();
setIdle(pool.length === 0);
</script>
</body>
</html>
